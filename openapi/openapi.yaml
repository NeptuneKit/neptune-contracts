openapi: 3.1.0
info:
  title: Neptune v2 Contracts
  version: 2.0.0-alpha.1
  description: |
    NeptuneKit v2 统一日志系统契约。
    该文件定义中心网关与客户端导出协议的最小可用骨架。
    HTTP 查询 + WS 实时/下发双通道为主契约。
servers:
  - url: http://127.0.0.1:18765
    description: HTTP query channel.
  - url: ws://127.0.0.1:18765
    description: WebSocket realtime / dispatch channel.
paths:
  /v2/ws:
    get:
      summary: Realtime and downstream WebSocket channel
      operationId: openRealtimeChannel
      description: |
        主实时通道。Inspector 通过 `hello` 完成握手，通过 `heartbeat` 保活；
        `command.send` 进入命令下发链路，网关会按当前 selected 客户端集合执行 HTTP 回调，
        再通过 `ack`、`event.command_ack`、`event.command_summary` 和 `error` 回传结果。
      responses:
        '101':
          description: Switching Protocols
      x-neptune-websocket:
        path: /v2/ws
        transport: websocket
        inbound:
          $ref: '#/components/schemas/WsInboundMessage'
        outbound:
          $ref: '#/components/schemas/WsOutboundMessage'
        messages:
          - hello
          - heartbeat
          - command.send
          - ack
          - event.log_record
          - event.command_ack
          - event.command_summary
          - error
  /v2/logs:ingest:
    post:
      summary: Ingest structured logs
      description: |
        接受三种等价的 ingest 编码：
        - 单个 JSON 对象
        - `IngestLogRecord` 数组
        - NDJSON（一行一个 `IngestLogRecord`）

        三者的记录语义一致，网关会统一归一化到同一 ingest 管线。
      operationId: ingestLogs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/IngestLogRecord'
                - type: array
                  items:
                    $ref: '#/components/schemas/IngestLogRecord'
            examples:
              single:
                summary: Single log record
                value:
                  timestamp: '2026-03-23T14:00:00.000Z'
                  level: debug
                  message: queue flushed
                  platform: android
                  appId: com.neptune.example
                  sessionId: session-002
                  deviceId: device-002
                  category: queue
                  attributes:
                    count: '50'
                  source:
                    sdkName: neptune-sdk-android
                    sdkVersion: 0.1.0
                    file: Logger.kt
                    function: flush()
                    line: 88
              batch:
                summary: Batch of log records
                value:
                  - timestamp: '2026-03-23T14:00:00.000Z'
                    level: debug
                    message: queue flushed
                    platform: android
                    appId: com.neptune.example
                    sessionId: session-002
                    deviceId: device-002
                    category: queue
                    attributes:
                      count: '50'
                    source:
                      sdkName: neptune-sdk-android
                      sdkVersion: 0.1.0
                      file: Logger.kt
                      function: flush()
                      line: 88
                  - timestamp: '2026-03-23T14:00:01.000Z'
                    level: warning
                    message: gateway unavailable, retrying
                    platform: android
                    appId: com.neptune.example
                    sessionId: session-002
                    deviceId: device-002
                    category: transport
                    attributes:
                      retry: '1'
                    source:
                      sdkName: neptune-sdk-android
                      sdkVersion: 0.1.0
                      file: Transport.kt
                      function: sendBatch()
                      line: 121
          application/x-ndjson:
            schema:
              type: string
              description: One JSON object per line. Each line must match `IngestLogRecord`.
            example: |-
              {"timestamp":"2026-03-23T14:00:00.000Z","level":"debug","message":"queue flushed","platform":"android","appId":"com.neptune.example","sessionId":"session-002","deviceId":"device-002","category":"queue","attributes":{"count":"50"},"source":{"sdkName":"neptune-sdk-android","sdkVersion":"0.1.0","file":"Logger.kt","function":"flush()","line":88}}
              {"timestamp":"2026-03-23T14:00:01.000Z","level":"warning","message":"gateway unavailable, retrying","platform":"android","appId":"com.neptune.example","sessionId":"session-002","deviceId":"device-002","category":"transport","attributes":{"retry":"1"},"source":{"sdkName":"neptune-sdk-android","sdkVersion":"0.1.0","file":"Transport.kt","function":"sendBatch()","line":121}}
      responses:
        '202':
          description: Accepted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v2/logs:
    get:
      summary: Query logs
      operationId: queryLogs
      description: |
        `format=json` 返回 `LogRecordPage` 包装对象；`format=ndjson` 返回 `application/x-ndjson`，
        每行一个 `LogRecord`，记录顺序与 JSON 响应中的 `records` 保持一致。

        当前长轮询策略为 `afterId + waitMs`。
        当 `afterId` 指向的游标之后暂时没有新记录时，网关最多等待 `waitMs` 毫秒；
        若超时仍无新记录，则返回空页，并保持 `nextCursor` 为请求中的 `afterId`。
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/beforeId'
        - $ref: '#/components/parameters/afterId'
        - $ref: '#/components/parameters/platform'
        - $ref: '#/components/parameters/appId'
        - $ref: '#/components/parameters/sessionId'
        - $ref: '#/components/parameters/level'
        - $ref: '#/components/parameters/contains'
        - $ref: '#/components/parameters/since'
        - $ref: '#/components/parameters/until'
        - $ref: '#/components/parameters/format'
        - $ref: '#/components/parameters/waitMs'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogRecordPage'
            application/x-ndjson:
              schema:
                type: string
                description: One JSON object per line.
        '400':
          $ref: '#/components/responses/BadRequest'
  /v2/metrics:
    get:
      summary: Gateway and source metrics
      description: Gateway 当前采集与保留状态的快照。
      operationId: getMetrics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'
  /v2/sources:
    get:
      summary: Registered sources
      description: 当前已注册且最近可见的 source 列表。
      operationId: listSources
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Source'
  /v2/clients:register:
    post:
      summary: Register or renew callback client
      operationId: registerClient
      description: |
        客户端启动或前台活跃时调用该接口注册可回调地址。
        网关以 `platform + appId + deviceId` 作为主键更新在线状态，默认 TTL 为 120 秒。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRegisterRequest'
      responses:
        '200':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v2/clients:
    get:
      summary: List online callback clients
      operationId: listClients
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientListResponse'
  /v2/clients:selected:
    put:
      summary: Replace selected clients
      operationId: replaceSelectedClients
      description: |
        桌面端提交全量勾选集，语义为覆盖写入（last-write-wins）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientsSelectedRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientsSelectedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v2/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /v2/gateway/discovery:
    get:
      summary: Discover gateway endpoint
      description: 客户端用于发现网关主机与端口的最小响应。
      operationId: discoverGateway
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayDiscovery'
components:
  parameters:
    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 200
    beforeId:
      name: beforeId
      in: query
      schema:
        type: integer
        format: int64
    afterId:
      name: afterId
      in: query
      schema:
        type: integer
        format: int64
    platform:
      name: platform
      in: query
      schema:
        type: string
        enum: [ios, android, harmony, web]
    appId:
      name: appId
      in: query
      schema:
        type: string
    sessionId:
      name: sessionId
      in: query
      schema:
        type: string
    level:
      name: level
      in: query
      schema:
        type: string
        enum: [trace, debug, info, notice, warning, error, critical]
    contains:
      name: contains
      in: query
      schema:
        type: string
    since:
      name: since
      in: query
      schema:
        type: string
        format: date-time
    until:
      name: until
      in: query
      schema:
        type: string
        format: date-time
    format:
      name: format
      in: query
      description: |
        `/v2/logs` 的响应格式。
        `json` 返回分页包装对象 `LogRecordPage`；
        `ndjson` 返回按行分隔的 `LogRecord` 流。
      schema:
        type: string
        enum: [json, ndjson]
        default: json
    waitMs:
      name: waitMs
      in: query
      description: |
        长轮询等待窗口，单位毫秒。
        仅在 `afterId` 存在时生效；若没有更新记录，网关会最多等待该时长后返回空页。
      schema:
        type: integer
        minimum: 0
        maximum: 20000
        default: 0
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LogRecord:
      type: object
      required: [id, timestamp, level, message, platform, appId, sessionId, deviceId, category]
      properties:
        id:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [trace, debug, info, notice, warning, error, critical]
        message:
          type: string
        platform:
          type: string
          enum: [ios, android, harmony, web]
        appId:
          type: string
        sessionId:
          type: string
        deviceId:
          type: string
        category:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
          nullable: true
        source:
          $ref: '#/components/schemas/SourceOrigin'
          nullable: true
    IngestLogRecord:
      type: object
      required: [timestamp, level, message, platform, appId, sessionId, deviceId, category]
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [trace, debug, info, notice, warning, error, critical]
        message:
          type: string
        platform:
          type: string
          enum: [ios, android, harmony, web]
        appId:
          type: string
        sessionId:
          type: string
        deviceId:
          type: string
        category:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
          nullable: true
        source:
          $ref: '#/components/schemas/SourceOrigin'
          nullable: true
    SourceOrigin:
      type: object
      description: SDK source metadata attached to an ingested log record.
      properties:
        sdkName:
          type: string
        sdkVersion:
          type: string
        file:
          type: string
        function:
          type: string
        line:
          type: integer
          format: int32
    LogRecordPage:
      type: object
      description: Paginated log query response.
      required: [records, hasMore]
      properties:
        records:
          type: array
          description: Records returned for the current query window.
          items:
            $ref: '#/components/schemas/LogRecord'
        nextCursor:
          type: integer
          format: int64
          nullable: true
          description: Cursor for the next query window. Empty pages keep the incoming cursor value.
        hasMore:
          type: boolean
          description: Whether more records are immediately available after `nextCursor`.
    Source:
      type: object
      description: A source identity currently known to the gateway.
      required: [platform, appId, sessionId, deviceId, lastSeenAt]
      properties:
        platform:
          type: string
          enum: [ios, android, harmony, web]
          description: Client platform that produced the logs.
        appId:
          type: string
          description: Application identifier reported by the SDK.
        sessionId:
          type: string
          description: Session identifier within the app installation.
        deviceId:
          type: string
          description: Device or emulator identifier.
        lastSeenAt:
          type: string
          format: date-time
          description: Most recent log or heartbeat timestamp seen for this source.
        sdkName:
          type: string
          nullable: true
          description: Reported SDK name, if available.
        sdkVersion:
          type: string
          nullable: true
          description: Reported SDK version, if available.
        status:
          type: string
          enum: [online, offline, stale]
          nullable: true
          description: Gateway-derived source status.
    MetricsSnapshot:
      type: object
      description: Aggregate gateway metrics at the moment of the request.
      required: [ingestAcceptedTotal, sourceCount, totalRecords, droppedOverflow]
      properties:
        ingestAcceptedTotal:
          type: integer
          description: Total number of ingest records accepted by the gateway.
        sourceCount:
          type: integer
          description: Number of currently registered sources.
        totalRecords:
          type: integer
          description: Number of log records currently retained by the gateway.
        droppedOverflow:
          type: integer
          description: Number of records dropped because retention or capacity limits were exceeded.
    HealthSnapshot:
      type: object
      required: [ok, version]
      properties:
        ok:
          type: boolean
        version:
          type: string
        message:
          type: string
          nullable: true
    GatewayDiscovery:
      type: object
      description: Gateway endpoint discovery payload.
      required: [host, port, version]
      properties:
        host:
          type: string
          description: Gateway host name or IP address.
        port:
          type: integer
          description: Gateway listener port.
        version:
          type: string
          description: Gateway contract or deployment version exposed to clients.
    ClientRegisterRequest:
      type: object
      required: [platform, appId, sessionId, deviceId, callbackEndpoint]
      properties:
        platform:
          type: string
          enum: [ios, android, harmony, web]
        appId:
          type: string
        sessionId:
          type: string
        deviceId:
          type: string
        callbackEndpoint:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
          nullable: true
    ClientSelector:
      type: object
      required: [platform, appId, deviceId]
      properties:
        platform:
          type: string
          enum: [ios, android, harmony, web]
        appId:
          type: string
        deviceId:
          type: string
    ClientSnapshot:
      type: object
      required: [platform, appId, sessionId, deviceId, callbackEndpoint, lastSeenAt, expiresAt, ttlSeconds, selected]
      properties:
        platform:
          type: string
          enum: [ios, android, harmony, web]
        appId:
          type: string
        sessionId:
          type: string
        deviceId:
          type: string
        callbackEndpoint:
          type: string
          format: uri
        lastSeenAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        ttlSeconds:
          type: integer
          minimum: 0
        selected:
          type: boolean
    ClientRegisterResponse:
      type: object
      required: [client]
      properties:
        client:
          $ref: '#/components/schemas/ClientSnapshot'
    ClientListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClientSnapshot'
    ClientsSelectedRequest:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClientSelector'
        selected:
          type: array
          items:
            $ref: '#/components/schemas/ClientSelector'
    ClientsSelectedResponse:
      type: object
      required: [items, selectedCount, updatedAt]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClientSelector'
        selectedCount:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time
    WsClientContext:
      type: object
      description: Shared client identity used by WS messages.
      properties:
        clientId:
          type: string
        role:
          type: string
          enum: [sdk, inspector, unknown]
        platform:
          type: string
          enum: [ios, android, harmony, web]
          nullable: true
        appId:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        deviceId:
          type: string
          nullable: true
    WsTarget:
      type: object
      description: Optional fan-out target used by command dispatch messages.
      properties:
        platforms:
          type: array
          items:
            type: string
            enum: [ios, android, harmony, web]
        appIds:
          type: array
          items:
            type: string
        sessionIds:
          type: array
          items:
            type: string
        deviceIds:
          type: array
          items:
            type: string
    WsHelloMessage:
      type: object
      required: [type]
      properties:
        type:
          const: hello
        requestId:
          type: string
        role:
          type: string
          enum: [sdk, inspector, unknown]
        platform:
          type: string
          enum: [ios, android, harmony, web]
        appId:
          type: string
        sessionId:
          type: string
        deviceId:
          type: string
    WsHeartbeatMessage:
      type: object
      required: [type]
      properties:
        type:
          const: heartbeat
        requestId:
          type: string
        clientTime:
          type: string
          format: date-time
    WsCommandSendMessage:
      type: object
      required: [type, command]
      properties:
        type:
          const: command.send
        requestId:
          type: string
        commandId:
          type: string
        command:
          type: string
        payload:
          type: object
          additionalProperties: true
        target:
          $ref: '#/components/schemas/WsTarget'
    WsAckMessage:
      type: object
      required: [type, commandId, accepted, delivered]
      properties:
        type:
          const: ack
        requestId:
          type: string
        commandId:
          type: string
        accepted:
          type: boolean
        delivered:
          type: integer
          minimum: 0
    WsEventLogRecordMessage:
      type: object
      required: [type, topic, topicId, record]
      properties:
        type:
          const: event.log_record
        topic:
          const: log_record
        topicId:
          type: integer
          const: 101
        record:
          $ref: '#/components/schemas/LogRecord'
    WsEventCommandAckMessage:
      type: object
      required: [type, commandId, command, status, timestamp]
      properties:
        type:
          const: event.command_ack
        requestId:
          type: string
        commandId:
          type: string
        command:
          type: string
        status:
          type: string
          enum: [ok, error]
        message:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time
        client:
          $ref: '#/components/schemas/WsClientContext'
    WsEventCommandSummaryMessage:
      type: object
      required: [type, commandId, command, delivered, acked, timeout]
      properties:
        type:
          const: event.command_summary
        requestId:
          type: string
        commandId:
          type: string
        command:
          type: string
        delivered:
          type: integer
          minimum: 0
        acked:
          type: integer
          minimum: 0
        timeout:
          type: integer
          minimum: 0
    WsErrorMessage:
      type: object
      required: [type, message]
      properties:
        type:
          const: error
        requestId:
          type: string
        code:
          type: string
          enum: [invalid_payload, invalid_target, unsupported_command, forbidden_role]
        message:
          type: string
        detail:
          type: string
          nullable: true
    WsInboundMessage:
      oneOf:
        - $ref: '#/components/schemas/WsHelloMessage'
        - $ref: '#/components/schemas/WsHeartbeatMessage'
        - $ref: '#/components/schemas/WsCommandSendMessage'
      discriminator:
        propertyName: type
    WsOutboundMessage:
      oneOf:
        - $ref: '#/components/schemas/WsAckMessage'
        - $ref: '#/components/schemas/WsEventLogRecordMessage'
        - $ref: '#/components/schemas/WsEventCommandAckMessage'
        - $ref: '#/components/schemas/WsEventCommandSummaryMessage'
        - $ref: '#/components/schemas/WsErrorMessage'
      discriminator:
        propertyName: type
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        detail:
          type: string
          nullable: true
